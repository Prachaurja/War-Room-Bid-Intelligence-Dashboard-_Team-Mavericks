services:
  db:
    image: postgres:16
    container_name: cap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cap}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cap_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: node:22
    container_name: cap-web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./:/app
      - cap_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  cap_postgres_data:
  cap_node_modules:
