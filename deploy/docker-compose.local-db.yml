services:
  db:
    image: postgres:16-alpine
    container_name: tendora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tendora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tendora"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/tendora
      SYNC_DATABASE_URL: postgresql://postgres:postgres@db:5432/tendora
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  postgres-data:
