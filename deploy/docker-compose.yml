services:
  redis:
    image: redis:7-alpine
    container_name: bid-dashboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: bid-dashboard-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/bid_dashboard}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/bid_dashboard}
      SECRET_KEY: ${SECRET_KEY:-change-me-for-local-development}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: bid-dashboard-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  redis-data:
