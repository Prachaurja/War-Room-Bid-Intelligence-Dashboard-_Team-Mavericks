apiVersion: v1
kind: Secret
metadata:
  name: tendora-secrets
  namespace: tendora
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tendora
  SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tendora
  SECRET_KEY: replace-me-with-a-long-random-secret
